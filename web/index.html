<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AI-RPCT Terminal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{background:#0b1020;color:white;font-family:Arial;padding:20px}
h1{font-size:40px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
.card{background:#151b2e;padding:20px;border-radius:12px}
.kpi{font-size:36px;font-weight:bold}
canvas{background:white;border-radius:10px;padding:10px}
</style>
</head>
<body>
<h1>AI-RPCT Terminal</h1>

<div class="grid">
<div class="card"><h3>AI Infrastructure Index</h3><div id="aiIndex" class="kpi">...</div></div>
<div class="card"><h3>GPU Price Index</h3><div id="gpuPrice" class="kpi">...</div></div>
<div class="card"><h3>Risk Score</h3><div id="riskScore" class="kpi">...</div></div>
<div class="card"><h3>Provider Count</h3><div id="providerCount" class="kpi">...</div></div>
</div>

<br>

<div class="grid">
<div class="card"><h3>GPU Price History</h3><canvas id="priceChart"></canvas></div>
<div class="card"><h3>Provider Market Share</h3><canvas id="marketShareChart"></canvas></div>
</div>

<script src="app.js"></script>
</body>
</html>
