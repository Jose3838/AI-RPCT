<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>AI-RPCT Customer Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 48px; max-width: 1100px; }
    h1 { font-size: 36px; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .card { border: 1px solid #ddd; padding: 20px; border-radius: 12px; }
    .value { font-size: 32px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Customer Decision Dashboard</h1>
  <p>GPU market intelligence, budget risk, provider switching and executive readiness.</p>

  <div class="grid">
    <div class="card"><div>Data Moat</div><div class="value">95</div></div>
    <div class="card"><div>Executive Score</div><div class="value">82.81</div></div>
    <div class="card"><div>Product Readiness</div><div class="value">88.67</div></div>
    <div class="card"><div>Collection Health</div><div class="value">healthy</div></div>
  </div>

  <div class="card">
    <h2>Customer Actions</h2>
    <a href="/api/v1/customer-intelligence">Customer Intelligence API</a><br>
    <a href="/api/v1/demo">Demo Snapshot</a><br>
    <a href="/docs">API Documentation</a>
  </div>
</body>
</html>
